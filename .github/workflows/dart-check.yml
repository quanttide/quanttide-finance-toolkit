name: dart-check
on:
  push:
    paths: ['packages/dart/**']
  pull_request:
    paths: ['packages/dart/**']
jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dart
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test
